<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ParkIQ — Book Your Slot</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;--surface:#111827;--border:#1e2d40;
  --accent:#00d4ff;--accent2:#0077ff;
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;
  --text:#e2e8f0;--muted:#64748b;
  --font-head:'Rajdhani',sans-serif;
  --font-body:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;display:flex;align-items:center;
  justify-content:center;padding:24px 16px;
  position:relative;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;top:-200px;left:50%;
  transform:translateX(-50%);width:700px;height:400px;
  background:radial-gradient(ellipse,rgba(0,212,255,.07) 0%,transparent 70%);
  pointer-events:none;
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;
}

.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;width:100%;max-width:480px;
  padding:36px 32px;position:relative;z-index:1;
  box-shadow:0 0 60px rgba(0,212,255,.05),0 24px 48px rgba(0,0,0,.4);
}

/* HEADER */
.header{text-align:center;margin-bottom:28px}
.logo-ring{
  width:64px;height:64px;border-radius:50%;
  border:2px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;position:relative;
}
.logo-ring::before{
  content:'';position:absolute;inset:-6px;
  border-radius:50%;border:1px solid rgba(0,212,255,.2);
}
.logo-ring svg{width:28px;height:28px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round}
.header h1{font-family:var(--font-head);font-size:32px;font-weight:700;letter-spacing:2px;line-height:1}
.header h1 span{color:var(--accent)}
.header p{font-size:13px;color:var(--muted);margin-top:6px}

/* SLOT STATUS */
.slot-status-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:12px;padding:12px 16px;margin-bottom:22px;
}
.slot-pill{
  display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
}
.slot-pill .dot{width:7px;height:7px;border-radius:50%;animation:pulse 2s infinite}
.pill-free  .dot{background:var(--green)}
.pill-free      {color:var(--green)}
.pill-occ   .dot{background:var(--red)}
.pill-occ       {color:var(--red)}
.pill-res   .dot{background:var(--yellow)}
.pill-res       {color:var(--yellow)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.dist-badge{font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--accent)}
.rssi-badge{font-size:11px;color:var(--muted)}

/* LIFECYCLE */
.lifecycle{
  display:flex;align-items:center;justify-content:center;
  flex-wrap:wrap;gap:4px;margin-bottom:22px;
}
.lc{
  font-size:10px;font-weight:700;letter-spacing:.5px;
  padding:3px 8px;border-radius:6px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--muted);transition:all .3s;
}
.lc.active{transform:scale(1.1)}
.lc-free.active  {color:var(--green);border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.1)}
.lc-book.active  {color:var(--accent);border-color:rgba(0,212,255,.4);background:rgba(0,212,255,.1)}
.lc-arrive.active{color:#a78bfa;border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.1)}
.lc-open.active  {color:#34d399;border-color:rgba(52,211,153,.4);background:rgba(52,211,153,.1)}
.lc-park.active  {color:var(--yellow);border-color:rgba(234,179,8,.4);background:rgba(234,179,8,.1)}
.lc-close.active {color:#fb923c;border-color:rgba(251,146,60,.4);background:rgba(251,146,60,.1)}
.lc-lock.active  {color:var(--red);border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.1)}
.lc-arrow{color:var(--muted);font-size:10px;padding:0 1px}

/* TOKEN */
.token-preview{
  background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.15);
  border-radius:12px;padding:14px 16px;margin-bottom:22px;
  display:flex;align-items:center;justify-content:space-between;
}
.token-preview .lbl{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.token-preview .val{font-family:var(--font-head);font-size:24px;font-weight:700;color:var(--accent);letter-spacing:3px}
.token-preview svg{width:32px;height:32px;stroke:rgba(0,212,255,.4);fill:none;stroke-width:1.5}

/* FORM */
.section-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.form-group{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:500;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
input,select{
  width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:10px;padding:13px 16px;color:var(--text);
  font-family:var(--font-body);font-size:14px;outline:none;
  transition:border-color .2s,background .2s;appearance:none;
}
input:focus,select:focus{border-color:var(--accent);background:rgba(0,212,255,.04)}
input::placeholder{color:var(--muted)}
select option{background:#1a2535}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}

/* PAY OPTIONS */
.pay-row{display:flex;gap:8px;margin-bottom:16px}
.pay-btn{
  flex:1;padding:10px 8px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:10px;
  color:var(--muted);font-size:12px;font-weight:600;
  font-family:var(--font-body);cursor:pointer;text-align:center;
  transition:all .2s;
}
.pay-btn.sel{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.4);color:var(--accent)}
.pay-icon{font-size:18px;display:block;margin-bottom:3px}

/* BUTTON */
.btn{
  width:100%;padding:16px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;border-radius:12px;color:#0a0e1a;
  font-family:var(--font-head);font-size:18px;font-weight:700;
  letter-spacing:2px;cursor:pointer;transition:opacity .2s,transform .1s;
  position:relative;overflow:hidden;
}
.btn:hover{opacity:.92}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn .spinner{
  display:none;width:18px;height:18px;
  border:2px solid rgba(10,14,26,.3);border-top-color:#0a0e1a;
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.loading .btn-text{display:none}
.btn.loading .spinner{display:block}

/* STATUS */
.status-msg{
  display:none;padding:14px 16px;border-radius:10px;
  font-size:13px;margin-top:14px;text-align:center;
  font-weight:500;line-height:1.6;white-space:pre-line;
}
.status-msg.success{display:block;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.status-msg.error  {display:block;background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:var(--red)}
.status-msg.info   {display:block;background:rgba(0,212,255,.1); border:1px solid rgba(0,212,255,.2); color:var(--accent)}

/* REFRESH */
.ref-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ref-txt{font-size:11px;color:var(--muted)}
.ref-btn{
  font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);
  border-radius:6px;padding:4px 10px;cursor:pointer;font-family:var(--font-body);
  transition:color .2s,border-color .2s;
}
.ref-btn:hover{color:var(--accent);border-color:var(--accent)}
.spin-sm{animation:spin .8s linear infinite;display:inline-block}

.footer{text-align:center;margin-top:24px;font-size:11px;color:var(--muted)}
.footer span{color:var(--accent)}
</style>
</head>
<body>
<div class="card">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-ring">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg>
    </div>
    <h1>PARK<span>IQ</span></h1>
    <p>Smart Parking · Slot 1 · IoT Booking System</p>
  </div>

  <!-- SLOT STATUS -->
  <div class="ref-row">
    <span class="ref-txt" id="upd-txt">Fetching slot status…</span>
    <button class="ref-btn" onclick="fetchStatus()"><span id="ref-icon">↻</span> Refresh</button>
  </div>
  <div class="slot-status-bar">
    <div class="slot-pill pill-free" id="slot-pill">
      <div class="dot"></div>
      <span id="slot-label">Checking…</span>
    </div>
    <span class="dist-badge" id="dist-val">— cm</span>
    <span class="rssi-badge" id="rssi-val">RSSI —</span>
  </div>

  <!-- LIFECYCLE -->
  <div class="lifecycle">
    <span class="lc lc-free"   id="lc-free">FREE</span>
    <span class="lc-arrow">→</span>
    <span class="lc lc-book"   id="lc-book">BOOK</span>
    <span class="lc-arrow">→</span>
    <span class="lc lc-arrive" id="lc-arrive">ARRIVE</span>
    <span class="lc-arrow">→</span>
    <span class="lc lc-open"   id="lc-open">OPEN</span>
    <span class="lc-arrow">→</span>
    <span class="lc lc-park"   id="lc-park">PARK</span>
    <span class="lc-arrow">→</span>
    <span class="lc lc-close"  id="lc-close">CLOSE</span>
    <span class="lc-arrow">→</span>
    <span class="lc lc-lock"   id="lc-lock">LOCK</span>
  </div>

  <!-- TOKEN -->
  <div class="token-preview">
    <div>
      <div class="lbl">Booking Token</div>
      <div class="val" id="tokenDisplay">SP-????</div>
    </div>
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>

  <!-- FORM -->
  <p class="section-label">Your Details</p>

  <div class="form-group">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="e.g. Arjun Kumar" autocomplete="off">
  </div>
  <div class="form-group">
    <label>Vehicle Number</label>
    <input type="text" id="vehicle" placeholder="e.g. KL07AB1234" autocomplete="off" style="text-transform:uppercase">
  </div>

  <hr class="divider">
  <p class="section-label">Duration</p>

  <div class="row-2">
    <div class="form-group">
      <label>Duration</label>
      <select id="duration">
        <option value="30min">30 min  — ₹10</option>
        <option value="1hr" selected>1 Hour  — ₹20</option>
        <option value="2hr">2 Hours — ₹35</option>
        <option value="3hr">3 Hours — ₹50</option>
        <option value="4hr">4 Hours — ₹60</option>
      </select>
    </div>
    <div class="form-group">
      <label>Arrival Time</label>
      <input type="time" id="arrivalTime">
    </div>
  </div>

  <hr class="divider">
  <p class="section-label">Payment Method</p>

  <div class="pay-row">
    <div class="pay-btn sel" onclick="selPay(this,'UPI')"   id="pay-upi">  <span class="pay-icon">📱</span>UPI</div>
    <div class="pay-btn"     onclick="selPay(this,'Cash')"  id="pay-cash"> <span class="pay-icon">💵</span>Cash</div>
    <div class="pay-btn"     onclick="selPay(this,'Card')"  id="pay-card"> <span class="pay-icon">💳</span>Card</div>
  </div>

  <!-- BOOK BUTTON -->
  <button class="btn" id="bookBtn" onclick="bookSlot()">
    <span class="btn-text">BOOK SLOT 1</span>
    <div class="spinner"></div>
  </button>

  <div class="status-msg" id="statusMsg"></div>

  <div class="footer">
    Powered by <span>ParkIQ</span> · ESP32 + LoRa 433MHz + Adafruit IO
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG — must match RX firmware
// ═══════════════════════════════════════════════════════
const AIO_USER     = "jay6025";
const AIO_KEY      = "aio_Kxhz45V1IBX4LDlmwsBPys6LrX0x";
const PARK_FEED    = "parking-s1";
const DIST_FEED    = "dist-s1";
const RSSI_FEED    = "rssi";
const BOOKING_FEED = "booking-status";  // subscribed by ESP32

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let slotStatus  = "loading";
let payMethod   = "UPI";
let autoRef     = null;
let currentToken = genToken();

function genToken() {
  return "SP-" + Math.floor(1000 + Math.random()*9000);
}
document.getElementById("tokenDisplay").textContent = currentToken;

// Set default arrival time = now + 15 min
const now = new Date();
now.setMinutes(now.getMinutes() + 15);
document.getElementById("arrivalTime").value =
  String(now.getHours()).padStart(2,"0") + ":" +
  String(now.getMinutes()).padStart(2,"0");

document.getElementById("vehicle").addEventListener("input", function(){
  this.value = this.value.toUpperCase();
});

// ═══════════════════════════════════════════════════════
//  LIFECYCLE INDICATOR
// ═══════════════════════════════════════════════════════
function setLifecycle(step) {
  const all = ["free","book","arrive","open","park","close","lock"];
  const idx = all.indexOf(step);
  all.forEach((s,i) => {
    const el = document.getElementById("lc-"+s);
    if (!el) return;
    el.classList.toggle("active", i===idx);
    el.style.opacity = i<=idx ? "1" : "0.3";
  });
}

// ═══════════════════════════════════════════════════════
//  FETCH SLOT STATUS FROM AIO
// ═══════════════════════════════════════════════════════
async function aioGet(feed) {
  const r = await fetch(
    `https://io.adafruit.com/api/v2/${AIO_USER}/feeds/${feed}/data/last`,
    { headers:{"X-AIO-Key":AIO_KEY} }
  );
  if (r.status===401) throw new Error("401 — wrong AIO_KEY");
  if (r.status===404) throw new Error("404 — feed '"+feed+"' not found");
  if (!r.ok)          throw new Error("HTTP "+r.status);
  return ((await r.json()).value||"").trim();
}

async function fetchStatus() {
  const icon   = document.getElementById("ref-icon");
  const updTxt = document.getElementById("upd-txt");
  icon.classList.add("spin-sm");
  updTxt.textContent = "Refreshing…";

  try {
    const [parkVal, distVal, rssiVal] = await Promise.all([
      aioGet(PARK_FEED),
      aioGet(DIST_FEED).catch(()=>""),
      aioGet(RSSI_FEED).catch(()=>""),
    ]);

    slotStatus = parkVal.toUpperCase();
    const dist = parseFloat(distVal)||null;
    const rssi = rssiVal ? parseInt(rssiVal) : null;

    // Update status pill
    const pill  = document.getElementById("slot-pill");
    const label = document.getElementById("slot-label");
    pill.className = "slot-pill " +
      (slotStatus==="FREE"?"pill-free":
       slotStatus==="OCCUPIED"?"pill-occ":"pill-res");
    label.textContent = slotStatus==="FREE"    ? "Slot 1 — Available" :
                        slotStatus==="OCCUPIED" ? "Slot 1 — Full" :
                        slotStatus==="RESERVED" ? "Slot 1 — Reserved" : slotStatus;

    document.getElementById("dist-val").textContent =
      dist && dist>0 ? dist.toFixed(1)+" cm" : "— cm";
    document.getElementById("rssi-val").textContent =
      rssi ? "RSSI "+rssi : "RSSI —";

    // Lifecycle
    setLifecycle(
      slotStatus==="FREE"     ? "free" :
      slotStatus==="RESERVED" ? "arrive" :
      slotStatus==="OCCUPIED" ? "lock"   : "free"
    );

    // Book button
    const btn = document.getElementById("bookBtn");
    btn.disabled = (slotStatus!=="FREE");
    btn.style.opacity = (slotStatus==="FREE") ? "1" : "0.5";
    if (slotStatus!=="FREE") {
      showStatus("info",
        slotStatus==="OCCUPIED" ? "🔴 Slot 1 is currently OCCUPIED.\nPlease check back later." :
        slotStatus==="RESERVED" ? "🟡 Slot 1 is RESERVED.\nWaiting for driver to arrive." : ""
      );
    } else {
      clearStatus();
    }

    updTxt.textContent = "Updated "+new Date().toLocaleTimeString()+" · next in 20s";
  } catch(e) {
    updTxt.textContent = "⚠ "+e.message;
    console.error("[Fetch]",e);
  }

  icon.classList.remove("spin-sm");
  clearInterval(autoRef);
  autoRef = setInterval(fetchStatus, 20000);
}

// ═══════════════════════════════════════════════════════
//  PAYMENT SELECTOR
// ═══════════════════════════════════════════════════════
function selPay(el, method) {
  document.querySelectorAll(".pay-btn").forEach(b=>b.classList.remove("sel"));
  el.classList.add("sel");
  payMethod = method;
}

// ═══════════════════════════════════════════════════════
//  BOOK SLOT
// ═══════════════════════════════════════════════════════
async function bookSlot() {
  const name     = document.getElementById("name").value.trim();
  const vehicle  = document.getElementById("vehicle").value.trim().toUpperCase();
  const duration = document.getElementById("duration").value;
  const time     = document.getElementById("arrivalTime").value;

  if (!name) { showStatus("error","Please enter your full name."); return; }
  if (!vehicle || vehicle.length < 4) { showStatus("error","Please enter a valid vehicle number."); return; }
  if (!time) { showStatus("error","Please set arrival time."); return; }

  if (slotStatus === "OCCUPIED") { showStatus("error","Slot is currently OCCUPIED. Cannot book."); return; }
  if (slotStatus === "RESERVED") { showStatus("error","Slot is already RESERVED. Cannot book."); return; }

  // Build booking string — exact format ESP32 aioCallback() expects
  // Format: Token:SP-1234|Slot:1|Name:Arjun|Vehicle:KL07|Dur:1hr|Time:14:30
  const bookingStr =
    `Token:${currentToken}|Slot:1|Name:${name}|Vehicle:${vehicle}|Dur:${duration}|Pay:${payMethod}|Time:${time}`;

  console.log("[ParkIQ] Sending:", bookingStr);

  if (window.location.protocol==="file:") {
    showStatus("error","⚠ Open via GitHub Pages URL.\nfile:// blocks Adafruit IO.");
    return;
  }

  const btn = document.getElementById("bookBtn");
  btn.classList.add("loading");
  btn.disabled = true;
  clearStatus();
  showStatus("info","⏳ Sending booking to Adafruit IO…");

  try {
    const r = await fetch(
      `https://io.adafruit.com/api/v2/${AIO_USER}/feeds/${BOOKING_FEED}/data`,
      {
        method:"POST",
        headers:{"X-AIO-Key":AIO_KEY,"Content-Type":"application/json"},
        body:JSON.stringify({value:bookingStr})
      }
    );

    if (r.ok) {
      // Lifecycle: FREE → BOOK
      setLifecycle("book");
      showStatus("success",
        `✅ BOOKING CONFIRMED!\n\n` +
        `Token: ${currentToken}\n` +
        `Slot 1 reserved for ${name}\n` +
        `Vehicle: ${vehicle}\n` +
        `Arrival: ${time}  ·  Duration: ${duration}\n` +
        `Payment: ${payMethod}\n\n` +
        `Show this token at the entrance gate.\n` +
        `ESP32 will mark slot RESERVED shortly.`
      );
      // Move to ARRIVE after booking
      setTimeout(()=>setLifecycle("arrive"), 2000);
      // Generate new token for next booking
      setTimeout(()=>{
        currentToken = genToken();
        document.getElementById("tokenDisplay").textContent = currentToken;
      }, 3000);
      // Re-fetch after ESP32 processes
      setTimeout(()=>fetchStatus(), 8000);
    } else {
      const hints = {
        401:"Wrong AIO_KEY — update index.html on GitHub",
        403:"Create 'booking-status' feed on Adafruit IO",
        429:"Rate limited — wait 1 minute"
      };
      const j = await r.json().catch(()=>({}));
      showStatus("error",`❌ Error ${r.status}: ${hints[r.status]||j.error||"check feeds"}`);
    }
  } catch(e) {
    showStatus("error","❌ Network error. Check your internet connection.\n"+e.message);
    console.error("[ParkIQ]",e);
  }

  btn.classList.remove("loading");
  btn.disabled = (slotStatus!=="FREE");
}

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function showStatus(type, msg) {
  const el = document.getElementById("statusMsg");
  el.className = "status-msg "+type;
  el.textContent = msg;
}
function clearStatus() {
  const el = document.getElementById("statusMsg");
  el.className = "status-msg";
  el.textContent = "";
}

// Console test: type testAIO()
async function testAIO() {
  console.log("[TEST] Testing AIO...");
  if (window.location.protocol==="file:"){console.error("[TEST] file:// blocked");return;}
  try {
    const r = await fetch(
      `https://io.adafruit.com/api/v2/${AIO_USER}/feeds/${PARK_FEED}/data/last`,
      {headers:{"X-AIO-Key":AIO_KEY}}
    );
    const d = await r.json();
    console.log("[TEST]",r.ok?"✅ OK — parking-s1 =":"❌ HTTP "+r.status, r.ok?d.value:"");
    if(r.status===401) console.error("[TEST] Wrong AIO_KEY");
    if(r.status===404) console.error("[TEST] parking-s1 feed not created");
  } catch(e){console.error("[TEST]",e.message);}
}

  setLifecycle("free");
